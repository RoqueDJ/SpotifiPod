name: Build SpotifiPod Nintendo DS ROM

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    # Use the official devkitPro container with devkitARM + libnds preinstalled
    container:
      image: ghcr.io/devkitpro/devkitarm:latest

    steps:
      # Checkout your repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Build the ROM
      - name: Build SpotifiPod
        run: make

      # Upload the compiled ROM
      - name: Upload ROM
        uses: actions/upload-artifact@v4
        with:
          name: SpotifiPod
          path: SpotifiPod.nds
