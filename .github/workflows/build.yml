name: Build Nintendo DS ROM

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install devkitPro
        run: |
          sudo apt update
          sudo apt install -y build-essential git
          git clone https://github.com/devkitPro/pacman-packages.git
          cd pacman-packages
          sudo ./dkp-pacman -Syu --noconfirm
          sudo ./dkp-pacman -S --noconfirm devkitARM libnds

      - name: Build project
        run: make

      - name: Upload ROM
        uses: actions/upload-artifact@v4
        with:
          name: SpotifiPod
          path: "*.nds"
