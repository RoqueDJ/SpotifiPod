name: Build SpotifiPod Nintendo DS ROM

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - uses: actions/checkout@v4

      # 2️⃣ Install prerequisites
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y wget git unzip

      # 3️⃣ Download devkitPro pacman .deb
      - name: Download devkitPro pacman
        run: |
          wget https://github.com/devkitPro/pacman/releases/download/v1.0.3/devkitpro-pacman.amd64.deb

      # 4️⃣ Install devkitPro pacman
      - name: Install devkitPro pacman
        run: sudo dpkg -i devkitpro-pacman.amd64.deb

      # 5️⃣ Install devkitARM and libnds
      - name: Install devkitARM and libnds
        run: |
          sudo dkp-pacman -Syu --noconfirm
          sudo dkp-pacman -S --noconfirm devkitARM libnds

      # 6️⃣ Set environment variables
      - name: Set devkitPro environment
        run: |
          echo "DEVKITPRO=/opt/devkitpro" >> $GITHUB_ENV
          echo "DEVKITARM=/opt/devkitpro/devkitARM" >> $GITHUB_ENV

      # 7️⃣ Build the ROM
      - name: Build SpotifiPod
        run: make

      # 8️⃣ Upload ROM artifact
      - name: Upload ROM
        uses: actions/upload-artifact@v4
        with:
          name: SpotifiPod
          path: SpotifiPod.nds
