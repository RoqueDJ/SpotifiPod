name: Build SpotifiPod

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitpro:latest  # Official devkitPro Docker image
    steps:
      # Step 1: Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up environment variables (optional)
      - name: Set devkitPro environment
        run: |
          echo "export DEVKITPRO=/opt/devkitpro" >> $GITHUB_ENV
          echo "export DEVKITARM=$DEVKITPRO/devkitARM" >> $GITHUB_ENV
          echo "export PATH=$DEVKITPRO/tools/bin:$PATH" >> $GITHUB_ENV

      # Step 3: Install any dependencies your project needs
      - name: Install additional dependencies
        run: sudo apt-get update && sudo apt-get install -y git wget unzip

      # Step 4: Build your project
      - name: Build SpotifiPod
        run: |
          cd SpotifiPod
          make all  # Or whatever build command your project uses

      # Step 5: Upload build artifacts (optional)
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SpotifiPod-build
          path: SpotifiPod/build/  # Adjust to your actual build folder
