name: Build devkitPro Project

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/devkitpro/devkitpro-linux:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update devkitPro pacman and install toolchains
        run: |
          sudo dkp-pacman -Syu --noconfirm
          sudo dkp-pacman -S --noconfirm devkitARM libnds

      - name: Build project
        run: |
          # Replace with your actual build commands
          make all

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            ./build
            ./bin
