name: Build SpotifiPod Nintendo DS ROM

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout your repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Install devkitPro using official method (curl pipe)
      - name: Install devkitPro pacman (Official)
        run: |
          sudo apt-get update
          sudo apt-get install -y curl git unzip
          curl -L https://apt.devkitpro.org/install-devkitpro-pacman | sudo bash

      # 3️⃣ Install devkitARM + libnds
      - name: Install devkitARM and libnds
        run: |
          sudo dkp-pacman -Syu --noconfirm
          sudo dkp-pacman -S --noconfirm devkitARM libnds

      # 4️⃣ Set environment variables for devkitPro tools
      - name: Set environment variables
        run: |
          echo "DEVKITPRO=/opt/devkitpro" >> $GITHUB_ENV
          echo "DEVKITARM=/opt/devkitpro/devkitARM" >> $GITHUB_ENV

      # 5️⃣ Build the ROM
      - name: Build SpotifiPod
        run: make

      # 6️⃣ Upload the compiled ROM
      - name: Upload ROM
        uses: actions/upload-artifact@v4
        with:
          name: SpotifiPod
          path: SpotifiPod.nds
