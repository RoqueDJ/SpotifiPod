name: Build SpotifiPod Nintendo DS ROM

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    # Use a valid devkitpro/devkitarm Docker image tag
    container:
      image: devkitpro/devkitarm:20251231

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile
        run: make

      - name: Upload ROM
        uses: actions/upload-artifact@v4
        with:
          name: SpotifiPod
          path: SpotifiPod.nds
