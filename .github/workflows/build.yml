name: Build SpotifiPod Nintendo DS ROM

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout your repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Install dependencies: devkitPro, devkitARM, libnds
      - name: Install devkitPro toolchains
        run: |
          sudo apt update
          sudo apt install -y wget git unzip curl
          
          # Download the official installer
          wget https://apt.devkitpro.org/install-devkitpro-pacman
          chmod +x install-devkitpro-pacman
          sudo ./install-devkitpro-pacman -y
          
          # Install devkitARM + libnds
          sudo dkp-pacman -Syu --noconfirm
          sudo dkp-pacman -S --noconfirm devkitARM libnds

          # Set environment variables
          echo "DEVKITPRO=/opt/devkitpro" >> $GITHUB_ENV
          echo "DEVKITARM=/opt/devkitpro/devkitARM" >> $GITHUB_ENV

      # 3️⃣ Build your ROM
      - name: Build SpotifiPod
        run: make

      # 4️⃣ Upload the compiled ROM as artifact
      - name: Upload ROM
        uses: actions/upload-artifact@v4
        with:
          name: SpotifiPod
          path: SpotifiPod.nds
