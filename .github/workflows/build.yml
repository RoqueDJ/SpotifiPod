name: Build Nintendo DS ROM

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up devkitPro
        uses: devkitpro/setup-devkitpro@v2
        with:
          toolchain: devkitARM
          libraries: libnds

      - name: Build project
        run: make

      - name: Upload ROM
        uses: actions/upload-artifact@v4
        with:
          name: SpotifiPod
          path: SpotifiPod.nds
